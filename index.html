<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐱 Atrapa al Gatito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- PANTALLA DE INICIO -->
    <div id="screen-start" class="screen active">
        <div class="start-card">
            <div class="title-wrap">
                <h1 class="game-title">Atrapa al<br><span>Gatito</span></h1>
                <div class="cat-emoji-big">🐱</div>
            </div>
            <p class="subtitle">El gatito más travieso del mundo<br>¡No dejes que se escape!</p>
            <div class="difficulty-wrap">
                <p class="diff-label">Dificultad</p>
                <div class="diff-btns">
                    <button class="diff-btn active" data-diff="easy">😸 Fácil</button>
                    <button class="diff-btn" data-diff="normal">😼 Normal</button>
                    <button class="diff-btn" data-diff="hard">😤 Difícil</button>
                </div>
            </div>
            <button id="btn-start" class="btn-main">¡Jugar! 🐾</button>
        </div>
        <div class="paw-bg"></div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="screen-game" class="screen">
        <header class="hud">
            <div class="hud-block">
                <span class="hud-label">Puntos</span>
                <span id="score" class="hud-value">0</span>
            </div>
            <div class="hud-block center">
                <span class="hud-label">Nivel</span>
                <div id="level-stars" class="level-stars">⭐</div>
            </div>
            <div class="hud-block">
                <span class="hud-label">Tiempo</span>
                <span id="timer" class="hud-value">30</span>
            </div>
        </header>

        <!-- Barra de progreso del tiempo del gatito -->
        <div class="catch-bar-wrap">
            <div id="catch-bar" class="catch-bar"></div>
        </div>

        <!-- Área de juego -->
        <div id="game-area" class="game-area">
            <div id="cat" class="cat hidden">
                <div id="cat-face" class="cat-face">
                    <!-- SVG del gatito inyectado por JS -->
                </div>
                <div id="cat-msg" class="cat-msg"></div>
            </div>

            <!-- Efectos de partículas -->
            <div id="particles" class="particles"></div>
        </div>

        <!-- Racha -->
        <div id="streak-banner" class="streak-banner hidden"></div>
    </div>

    <!-- PANTALLA DE FIN -->
    <div id="screen-end" class="screen">
        <div class="end-card">
            <div id="end-emoji" class="end-emoji">😹</div>
            <h2 id="end-title" class="end-title">¡Tiempo!</h2>
            <p id="end-msg" class="end-msg">Lo hiciste genial</p>
            <div class="end-stats">
                <div class="stat-box">
                    <span class="stat-num" id="final-score">0</span>
                    <span class="stat-lbl">Puntos</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="final-caught">0</span>
                    <span class="stat-lbl">Atrapados</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="final-best-streak">0</span>
                    <span class="stat-lbl">Mejor racha</span>
                </div>
            </div>
            <div class="end-btns">
                <button id="btn-restart" class="btn-main">Otra vez 🐾</button>
                <button id="btn-menu" class="btn-secondary">Menú</button>
            </div>
        </div>
    </div>

    <!-- Scripts en orden de dependencia -->
    <script src="js/cat.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
